<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" id="meta-description" />
  <meta name="author" content="" id="meta-author" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="" id="og-title" />
  <meta property="og:description" content="" id="og-description" />

  <title id="page-title">Spinzi</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Skip navigation for accessibility -->
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- Navigation -->
  <header class="site-header" role="banner">
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a href="#" class="nav-logo" aria-label="Spinzi — home">
        <span class="nav-logo-mark" aria-hidden="true">S</span>
        <span class="nav-logo-text">spinzi</span>
      </a>
      <ul class="nav-links" role="list">
        <li><a href="#about">about</a></li>
        <li><a href="#projects">projects</a></li>
        <li><a href="#verse">verse</a></li>
      </ul>
      <button class="nav-menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span class="hamburger" aria-hidden="true"></span>
      </button>
    </nav>
    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu" role="dialog" aria-label="Navigation menu" hidden>
      <ul class="mobile-nav-links" role="list">
        <li><a href="#about">about</a></li>
        <li><a href="#projects">projects</a></li>
        <li><a href="#verse">verse</a></li>
      </ul>
    </div>
  </header>

  <main id="main-content">

    <!-- Hero Section -->
    <section class="hero" id="home" aria-label="Introduction">
      <canvas class="hero-canvas" id="hero-canvas" aria-hidden="true"></canvas>
      <div class="hero-content">
        <p class="hero-greeting" aria-hidden="true"></p>
        <h1 class="hero-name"></h1>
        <p class="hero-tagline"></p>
        <p class="hero-subtext"></p>
        <div class="hero-cta" role="group" aria-label="Call to action buttons"></div>
      </div>
      <div class="hero-scroll-hint" aria-hidden="true">
        <span class="scroll-line"></span>
      </div>
    </section>

    <!-- About Section -->
    <section class="about section" id="about" aria-labelledby="about-heading">
      <div class="container">
        <div class="section-eyebrow" aria-hidden="true">01 · who I am</div>
        <h2 class="section-heading" id="about-heading">A bit about me</h2>
        <div class="about-body">
          <div class="about-text" id="about-paragraphs"></div>
          <div class="about-sidebar">
            <div class="tag-cloud" id="about-tags" role="list" aria-label="Skills and interests"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section class="projects section" id="projects" aria-labelledby="projects-heading">
      <div class="container">
        <div class="section-eyebrow" aria-hidden="true">02 · what I build</div>
        <h2 class="section-heading" id="projects-heading">Projects</h2>
        <p class="section-subheading">Things I've made, learned from, and shipped.</p>
        <div class="projects-grid" id="projects-grid" role="list"></div>
      </div>
    </section>

    <!-- Verse Section -->
    <section class="verse-section section" id="verse" aria-labelledby="verse-heading">
      <div class="container">
        <div class="section-eyebrow" aria-hidden="true">03 · what grounds me</div>
        <h2 class="visually-hidden" id="verse-heading">Daily Bible Verse</h2>
        <figure class="verse-card" id="verse-card" aria-labelledby="verse-heading">
          <blockquote class="verse-text" id="verse-text"></blockquote>
          <figcaption class="verse-ref" id="verse-ref"></figcaption>
        </figure>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-text" id="footer-text"></p>
        <nav class="footer-social" aria-label="Social links">
          <ul class="social-links" id="social-links" role="list"></ul>
        </nav>
      </div>
    </div>
  </footer>

  <!-- Project Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close project details">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
